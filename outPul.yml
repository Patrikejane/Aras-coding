# azure-pipelines.yml
trigger: none
pr:
  branches:
    include: [ main, develop ]

steps:
  - task: PythonScript@0
    displayName: "Extract Aras Method Code"
    inputs:
      scriptPath: Tools/CodeExtractor.py

  - task: PythonScript@0
    displayName: "LLM Static Analysis"
    inputs:
      scriptPath: Tools/analyzer_agent.py
    env:
      LLM_API_KEY: $(LLM_API_KEY)      # stored in ADO secret variables

  - task: PythonScript@0
    displayName: "Post Results to PR"
    inputs:
      scriptPath: Tools/post_to_pr.py  # ← new script
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      PR_ID: $(System.PullRequest.PullRequestId)
```

The `post_to_pr.py` script reads `analysis_report.json` and calls the ADO REST API:

- **AUTO_FAIL issues** → posted as inline PR thread comments, status = `active`, PR vote set to **Rejected**
- **NEEDS_REVIEW issues** → posted as PR comments assigned to the named reviewer (`ArasArchitect`, `SecurityTeam`), status = `active`
- **AUTO_PASS** → single summary comment: "✅ Static analysis passed — N rules checked"

This distinction between code hygiene checks (auto) and risk-relevant checks (human review) is exactly what enterprises need — static analysis strengthens PR governance without becoming a delivery bottleneck. 

